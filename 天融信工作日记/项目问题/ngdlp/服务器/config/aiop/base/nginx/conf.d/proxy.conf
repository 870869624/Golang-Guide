# proxy pass
set $bff_proxy         http://bff:8888;
set $agentsvc_proxy    http://agentsvc:8888;
set $consumersvc_proxy http://consumersvc:8888;
set $ersvc_proxy       http://ersvc:8888;
set $licensesvc_proxy  http://licensesvc:8888;
set $managersvc_proxy  http://managersvc:8888;
set $systemsvc_proxy   http://systemsvc:8888;
set $upgradesvc_proxy  http://upgradesvc:8888;
set $downloader_proxy  http://upgradesvc:8000;
set $ngdlp_proxy       http://ngdlp:8888;
set $ngedr_proxy       http://ngedr:8888;
set $paddleocr_proxy   http://paddle-ocr:8866;

if ($request_method = 'OPTIONS') {
    return 200;
}

if ($query_string ~* "union.*select.*\(|concat.*\(") {
    return 400;
}

